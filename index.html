<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap');

  :root{
    --bg-deep:#0B1A26;
    --bg-panel:#122536;
    --bg-panel-2:#0E2030;
    --grid-line:#1C3A50;
    --ink:#E7EEF3;
    --ink-dim:#8CA6B8;
    --ink-faint:#547086;
    --accent:#FF6A2B;
    --accent-dim:#8A3E1B;
    --ok:#5FD9A4;
    --mono:'JetBrains Mono', monospace;
    --sans:'Inter', -apple-system, sans-serif;
  }
  *{box-sizing:border-box;}
  .pm-root{
    background:
      linear-gradient(var(--grid-line) 1px, transparent 1px) 0 0/32px 32px,
      linear-gradient(90deg, var(--grid-line) 1px, transparent 1px) 0 0/32px 32px,
      var(--bg-deep);
    background-blend-mode: overlay, overlay, normal;
    opacity: 1;
    color:var(--ink);
    font-family:var(--sans);
    min-height:100%;
    padding:28px 18px 40px;
    position:relative;
  }
  .pm-root::before{
    content:"";
    position:absolute; inset:0;
    background:
      linear-gradient(rgba(28,58,80,0.35) 1px, transparent 1px) 0 0/32px 32px,
      linear-gradient(90deg, rgba(28,58,80,0.35) 1px, transparent 1px) 0 0/32px 32px;
    pointer-events:none;
  }
  .pm-wrap{max-width:640px;margin:0 auto;position:relative;z-index:1;}

  .pm-eyebrow{
    font-family:var(--mono);
    font-size:11px;
    letter-spacing:0.18em;
    color:var(--accent);
    text-transform:uppercase;
    margin-bottom:10px;
    display:flex; align-items:center; gap:8px;
  }
  .pm-eyebrow::before{
    content:"";
    width:7px;height:7px;
    background:var(--accent);
    display:inline-block;
    animation:pulse 1.8s ease-in-out infinite;
  }
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}

  .pm-h1{
    font-family:var(--mono);
    font-weight:700;
    font-size:26px;
    line-height:1.25;
    letter-spacing:-0.01em;
    margin:0 0 8px;
    color:var(--ink);
  }
  .pm-h1 span{color:var(--ink-faint);}
  .pm-sub{
    font-size:14.5px;
    color:var(--ink-dim);
    line-height:1.55;
    margin:0 0 26px;
    max-width:50ch;
  }

  .pm-panel{
    background:var(--bg-panel);
    border:1px solid var(--grid-line);
    padding:20px;
    position:relative;
  }
  .pm-panel::before{
    content:"";
    position:absolute; top:-1px; left:-1px;
    width:14px; height:14px;
    border-top:2px solid var(--accent);
    border-left:2px solid var(--accent);
  }
  .pm-panel::after{
    content:"";
    position:absolute; bottom:-1px; right:-1px;
    width:14px; height:14px;
    border-bottom:2px solid var(--accent);
    border-right:2px solid var(--accent);
  }

  .pm-label{
    font-family:var(--mono);
    font-size:11px;
    letter-spacing:0.1em;
    text-transform:uppercase;
    color:var(--ink-faint);
    margin-bottom:8px;
    display:block;
  }
  .pm-textarea{
    width:100%;
    background:var(--bg-panel-2);
    border:1px solid var(--grid-line);
    color:var(--ink);
    font-family:var(--sans);
    font-size:14.5px;
    line-height:1.5;
    padding:12px 14px;
    resize:vertical;
    min-height:84px;
    outline:none;
  }
  .pm-textarea:focus{border-color:var(--accent);}
  .pm-textarea::placeholder{color:var(--ink-faint);}

  .pm-examples{
    display:flex; flex-wrap:wrap; gap:8px;
    margin-top:10px;
  }
  .pm-chip{
    font-family:var(--mono);
    font-size:11.5px;
    color:var(--ink-dim);
    background:var(--bg-panel-2);
    border:1px solid var(--grid-line);
    padding:6px 10px;
    cursor:pointer;
    transition:border-color .15s, color .15s;
  }
  .pm-chip:hover{border-color:var(--accent); color:var(--ink);}

  .pm-btn{
    margin-top:16px;
    width:100%;
    background:var(--accent);
    color:#151008;
    border:none;
    font-family:var(--mono);
    font-weight:700;
    font-size:13.5px;
    letter-spacing:0.06em;
    text-transform:uppercase;
    padding:13px 16px;
    cursor:pointer;
    transition:background .15s, transform .1s;
  }
  .pm-btn:hover{background:#ff7d45;}
  .pm-btn:active{transform:scale(0.99);}
  .pm-btn:disabled{background:var(--accent-dim); color:var(--ink-faint); cursor:not-allowed;}

  .pm-status{
    font-family:var(--mono);
    font-size:12px;
    color:var(--ink-dim);
    margin-top:14px;
    display:flex; align-items:center; gap:8px;
  }
  .pm-scan{
    width:12px;height:12px;
    border:2px solid var(--accent);
    border-top-color:transparent;
    border-radius:50%;
    animation:spin .8s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}

  .pm-results{margin-top:26px;}
  .pm-results-head{
    font-family:var(--mono);
    font-size:11px;
    letter-spacing:0.1em;
    text-transform:uppercase;
    color:var(--ink-faint);
    margin-bottom:12px;
    display:flex; justify-content:space-between;
  }

  .pm-card{
    background:var(--bg-panel);
    border:1px solid var(--grid-line);
    border-left:3px solid var(--accent);
    padding:16px 18px;
    margin-bottom:10px;
    position:relative;
    animation:reveal .35s ease both;
  }
  .pm-card.pm-card-2, .pm-card.pm-card-3{border-left-color:var(--ink-faint);}
  @keyframes reveal{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:none;}}

  .pm-card-top{
    display:flex; justify-content:space-between; align-items:flex-start;
    gap:12px; margin-bottom:8px;
  }
  .pm-card-name{
    font-size:14.5px; font-weight:600; color:var(--ink);
    line-height:1.4;
  }
  .pm-card-price{
    font-family:var(--mono); font-weight:700; font-size:15px;
    color:var(--ok); white-space:nowrap;
  }
  .pm-card-meta{
    display:flex; gap:14px; flex-wrap:wrap;
    font-family:var(--mono); font-size:11.5px; color:var(--ink-faint);
    margin-bottom:10px;
  }
  .pm-card-meta b{color:var(--ink-dim); font-weight:500;}
  .pm-conf{
    display:inline-flex; align-items:center; gap:6px;
    font-family:var(--mono); font-size:11px;
    color:var(--accent);
  }
  .pm-conf-bar{
    width:44px; height:4px; background:var(--grid-line); position:relative; overflow:hidden;
  }
  .pm-conf-fill{height:100%; background:var(--accent);}
  .pm-card-reason{
    font-size:13px; color:var(--ink-dim); line-height:1.5;
    border-top:1px dashed var(--grid-line); padding-top:10px; margin-top:2px;
  }

  .pm-empty, .pm-error{
    font-family:var(--mono); font-size:12.5px; color:var(--ink-faint);
    padding:14px 0;
  }
  .pm-error{color:#FF9B7A;}

  .pm-foot{
    margin-top:22px;
    font-size:11.5px; color:var(--ink-faint);
    font-family:var(--mono);
    line-height:1.6;
  }
</style>

<div class="pm-root">
  <div class="pm-wrap">
    <div class="pm-eyebrow">Прототип — определитель детали</div>

</div>

  "Газонокосилка Huter не держит газ",

];
const exWrap = document.getElementById('pm-examples');
examples.forEach(ex => {
  const chip = document.createElement('div');
  chip.className = 'pm-chip';
  chip.textContent = ex;
  chip.onclick = () => { document.getElementById('pm-input').value = ex; };
  exWrap.appendChild(chip);
});

const btn = document.getElementById('pm-submit');
const input = document.getElementById('pm-input');
const statusEl = document.getElementById('pm-status');
const resultsEl = document.getElementById('pm-results');

async function findPart(){
  const query = input.value.trim();
  if(!query){
    statusEl.innerHTML = '<div class="pm-error">Опишите проблему хотя бы одной фразой</div>';
    return;
  }
  btn.disabled = true;
  resultsEl.innerHTML = '';
  statusEl.innerHTML = '<div class="pm-status"><div class="pm-scan"></div>Сопоставляю с каталогом (' + CATALOG.length + ' SKU)…</div>';

  const catalogText = CATALOG.map(p => `- ${p.name} | артикул: ${p.article} | sku: ${p.sku} | цена: ${p.price}₽`).join('\n');

  const systemPrompt = `Ты — агент подбора запчастей для магазина 3D-печатных деталей на Ozon. У тебя есть каталог из ${CATALOG.length} позиций. Покупатель описывает проблему своими словами. Твоя задача — найти от 1 до 3 наиболее подходящих позиций из каталога.

КАТАЛОГ:
${catalogText}

Верни ТОЛЬКО валидный JSON без markdown-разметки, без \`\`\`, в формате:
{"matches":[{"name":"точное название из каталога","article":"артикул","sku":"sku","price":число,"confidence":число от 0 до 100,"reason":"короткое объяснение почему эта деталь подходит, 1 предложение, на русском"}]}

Если ничего явно не подходит — верни {"matches":[]}. Не выдумывай позиции, которых нет в каталоге.`;

  try{
    const response = await fetch("/api/find-part", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ system: systemPrompt, query: query })
    });
    const data = await response.json();
    if(!response.ok){
      statusEl.innerHTML = '<div class="pm-error">Ошибка сервера: ' + escapeHtml(data.error || '') + '<br>' + escapeHtml(data.details || '') + '</div>';
      btn.disabled = false;
      return;
    }
    const text = data.text || '';
    const clean = text.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);
    renderResults(parsed.matches || [], query);
  }catch(err){
    statusEl.innerHTML = '<div class="pm-error">Ошибка запроса. Попробуйте ещё раз.</div>';
    console.error(err);
    btn.disabled = false;
    return;
  }
  statusEl.innerHTML = '';
  btn.disabled = false;
}

function renderResults(matches, query){
  if(!matches.length){
    resultsEl.innerHTML = '<div class="pm-empty">Не нашёл однозначного совпадения в каталоге под запрос «' + escapeHtml(query) + '». Возможно, стоит расширить ассортимент под эту модель.</div>';
    return;
  }
  const head = document.createElement('div');
  head.className = 'pm-results-head';
  head.innerHTML = `<span>Найдено совпадений: ${matches.length}</span><span>Ozon SKU →</span>`;
  resultsEl.appendChild(head);

  matches.forEach((m, i) => {
    const card = document.createElement('div');
    card.className = 'pm-card pm-card-' + (i+1);
    const conf = Math.max(0, Math.min(100, Number(m.confidence) || 0));
    card.innerHTML = `
      <div class="pm-card-top">
        <div class="pm-card-name">${escapeHtml(m.name || '')}</div>
        <div class="pm-card-price">${m.price ? m.price + ' ₽' : ''}</div>
      </div>
      <div class="pm-card-meta">
        <span><b>Артикул:</b> ${escapeHtml(String(m.article || '—'))}</span>
        <span><b>SKU:</b> ${escapeHtml(String(m.sku || '—'))}</span>
        <span class="pm-conf">Уверенность ${conf}%
          <span class="pm-conf-bar"><span class="pm-conf-fill" style="width:${conf}%"></span></span>
        </span>
      </div>
      <div class="pm-card-reason">${escapeHtml(m.reason || '')}</div>
    `;
    resultsEl.appendChild(card);
  });
}

function escapeHtml(str){
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

btn.addEventListener('click', findPart);
input.addEventListener('keydown', (e) => {
  if(e.key === 'Enter' && e.ctrlKey) findPart();
});
</script>
